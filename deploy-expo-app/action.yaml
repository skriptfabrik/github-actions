name: Deploy Expo App
description: Deploy an Expo web app using EAS

inputs:
  alias:
    description: Alias to assign to the deployment
    required: false

  working-directory:
    description: Working directory for the deploy command
    required: false

outputs:
  artifact-digest:
    description: Deployment artifact digest
    value: ${{ steps.upload.outputs.artifact-digest }}

  artifact-id:
    description: Deployment artifact ID
    value: ${{ steps.upload.outputs.artifact-id }}

  artifact-url:
    description: URL to the deployment artifact
    value: ${{ steps.upload.outputs.artifact-url }}

  dashboard-url:
    description: URL to deployment dashboard
    value: ${{ fromJson(steps.deployment.outputs.result).dashboardUrl }}

  identifier:
    description: Deployment identifier
    value: ${{ fromJson(steps.deployment.outputs.result).identifier }}

  url:
    description: URL to deployment
    value: ${{ fromJson(steps.deployment.outputs.result).url }}

runs:
  using: composite
  steps:
    - name: Setup variables
      id: setup-vars
      run: |
        if [ -n "$EAS_WORKING_DIRECTORY" ] && [ -f "$EAS_WORKING_DIRECTORY/.env.local" ]; then
          echo "sentry-auth-token=$(grep SENTRY_AUTH_TOKEN "$EAS_WORKING_DIRECTORY/.env.local" | cut -d= -f2-)" >> $GITHUB_OUTPUT
        fi
        echo "artifact-name=$(basename '${{ inputs.working-directory || github.workspace }}')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Export web app
      uses: actions/github-script@v8
      env:
        SENTRY_AUTH_TOKEN: ${{ steps.setup-vars.outputs.sentry-auth-token }}
      with:
        script: |
          const { stdout } = await exec.getExecOutput('pnpm', ['list', 'expo'], { cwd: core.getInput('working-directory') || process.cwd() });
          const args = ['-s', stdout.includes('expo') ? 'exec' : 'dlx', 'expo', 'export', '--output-dir', 'build', '--platform', 'web', '--clear'];
          if (process.env.SENTRY_AUTH_TOKEN !== '') {
            args.push('--source-maps');
          }
          await exec.exec('pnpm', args, { cwd: core.getInput('working-directory') || process.cwd() });

    - name: Upload source maps to Sentry
      if: ${{ steps.setup-vars.outputs.sentry-auth-token != '' }}
      env:
        SENTRY_AUTH_TOKEN: ${{ steps.setup-vars.outputs.sentry-auth-token }}
      run: pnpm -s exec sentry-expo-upload-sourcemaps build
      shell: bash
      working-directory: ${{ inputs.working-directory || github.workspace }}

    - name: Deploy web app
      uses: actions/github-script@v8
      id: deployment
      with:
        script: |
          const args = ['deploy', '--export-dir=build', '--json', '--non-interactive'];
          const alias = core.getInput('alias');
          if (alias !== '') {
            if (alias === 'production') {
              args.push('--prod');
            } else {
              args.push(`--alias=${alias}`);
            }
          }
          const { stdout } = await exec.getExecOutput('eas', args, { cwd: core.getInput('working-directory') || process.cwd() });
          return JSON.parse(stdout);

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v7
      id: upload
      with:
        name: ${{ steps.setup-vars.outputs.artifact-name }}.zip
        path: ${{ inputs.working-directory || github.workspace }}/build
        retention-days: 7
