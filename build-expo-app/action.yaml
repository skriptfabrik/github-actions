name: Build Expo App
description: Build an Expo app using EAS

inputs:
  local:
    description: Run build locally?
    default: "false"

  platform:
    description: Platform to build for (all/android/ios)
    required: false

  profile:
    description: Name of the build profile
    required: false

  submit:
    description: Auto submit to the store? (production profile only)
    default: "false"

  working-directory:
    description: Working directory for the build command
    required: false

outputs:
  app-build-version:
    description: App build version
    value: ${{ steps.build.outputs.result && fromJson(steps.build.outputs.result)[0].appBuildVersion }}

  app-version:
    description: App version
    value: ${{ steps.build.outputs.result && fromJson(steps.build.outputs.result)[0].appVersion }}

  artifact-digest:
    description: Build artifact digest
    value: ${{ steps.upload.outputs.artifact-digest }}

  artifact-id:
    description: Build artifact ID
    value: ${{ steps.upload.outputs.artifact-id }}

  artifact-url:
    description: URL to the build artifact
    value: ${{ steps.upload.outputs.artifact-url }}

  profile:
    description: Name of the build profile
    value: ${{ steps.build.outputs.result && fromJson(steps.build.outputs.result)[0].buildProfile }}

runs:
  using: composite
  steps:
    - name: Setup variables
      id: setup-vars
      run: |
        # Setup variables
        working_directory="${{ inputs.working-directory || env.EAS_WORKING_DIRECTORY || github.workspace }}"
        echo "artifact-name=$(basename $working_directory)" >> $GITHUB_OUTPUT
        echo "working-directory=$working_directory" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build app
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: build
      env:
        ARTIFACT_NAME: ${{ steps.setup-vars.outputs.artifact-name }}
        LOCAL: ${{ inputs.local }}
        PLATFORM: ${{ inputs.platform || env.EAS_PLATFORM }}
        PROFILE: ${{ inputs.profile }}
        SUBMIT: ${{ inputs.submit }}
        WORKING_DIRECTORY: ${{ steps.setup-vars.outputs.working-directory }}
      with:
        script: |
          const args = ['build', '--json', '--non-interactive'];
          if (process.env.PLATFORM) {
            args.push(`--platform=${ process.env.PLATFORM }`);
          }
          if (process.env.PROFILE) {
            args.push(`--profile=${ process.env.PROFILE }`);
          }
          if (process.env.PROFILE === 'production' && process.env.SUBMIT === 'true') {
            args.push('--auto-submit');
          }
          if (process.env.LOCAL === 'true') {
            args.push('--local');
            if (process.env.PROFILE === 'production') {
              args.push(`--output=build/${ process.env.ARTIFACT_NAME }.aab`);
            } else {
              args.push(`--output=build/${ process.env.ARTIFACT_NAME }.apk`);
            }
          } else {
            args.push('--wait');
          }
          const { stdout } = await exec.getExecOutput('eas', args, { cwd: process.env.WORKING_DIRECTORY });
          return JSON.parse(stdout);

    - name: Download app
      if: ${{ steps.build.outputs.result && inputs.local != 'true' }}
      env:
        ARTIFACT_NAME: ${{ steps.setup-vars.outputs.artifact-name }}
        WORKING_DIRECTORY: ${{ steps.setup-vars.outputs.working-directory }}
      run: |
        # Create build directory and download the artifact
        mkdir -p ${WORKING_DIRECTORY}/build
        if [ "${{ fromJson(steps.build.outputs.result)[0].buildProfile }}" = "production" ]; then
          curl -fLs ${{ fromJson(steps.build.outputs.result)[0].artifacts.buildUrl }} --output ${WORKING_DIRECTORY}/build/${ARTIFACT_NAME}.aab
        else
          curl -fLs ${{ fromJson(steps.build.outputs.result)[0].artifacts.buildUrl }} --output ${WORKING_DIRECTORY}/build/${ARTIFACT_NAME}.apk
        fi
      shell: bash

    - name: Upload build artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      id: upload
      with:
        name: ${{ steps.setup-vars.outputs.artifact-name }}.zip
        path: ${{ steps.setup-vars.outputs.working-directory }}/build
        retention-days: 7
