name: Build Docker Image
description: Build and push a Docker image to GitHub Container Registry

inputs:
  build-args:
    description: Additional build arguments
    default: ""

  context:
    description: Build context
    default: .

  file:
    description: Path to the Dockerfile
    default: Dockerfile

  labels:
    description: Additional labels to add to the Docker image
    default: ""

  name:
    description: Name of the Docker image
    default: ""

  platforms:
    description: Platforms to build for
    default: |
      linux/amd64
      linux/arm64

  push:
    description: Push the image to the registry
    default: "true"

  tags:
    description: Tags to apply to the image
    default: type=sha

outputs:
  digest:
    description: The digest of the built image
    value: ${{ steps.summary.outputs.result && fromJson(steps.summary.outputs.result).digest }}

  image:
    description: The name of the built image
    value: ${{ steps.summary.outputs.result && fromJson(steps.summary.outputs.result).image }}

  additional-images:
    description: Additional image names (if multiple tags are used)
    value: ${{ steps.summary.outputs.result && fromJson(steps.summary.outputs.result).additionalImages }}

runs:
  using: composite
  steps:
    - name: Setup variables
      id: setup-vars
      run: |
        # Setup variables
        image=ghcr.io/${{ github.repository }}
        if [ "${{ inputs.context }}" != "." ]; then
          image="${image}/${{ inputs.context }}"
        fi
        if [ -n "${{ inputs.name }}" ]; then
          image="${image}/${{ inputs.name }}"
        fi
        echo "image=$image" >> $GITHUB_OUTPUT
      shell: bash

    - name: Setup QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract metadata
      id: metadata
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ steps.setup-vars.outputs.image }}
        labels: ${{ inputs.labels }}
        tags: ${{ inputs.tags }}

    - name: Build and push image
      id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        context: ${{ inputs.context }}
        file: ${{ inputs.context }}/${{ inputs.file }}
        labels: ${{ steps.metadata.outputs.labels }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ steps.metadata.outputs.tags }}

    - name: Export metadata
      id: export
      run: |
        metadata_file=$(mktemp)
        cat <<'EOF' >$metadata_file
        ${{ steps.build.outputs.metadata }}
        EOF
        echo "metadata-file=$metadata_file" >> $GITHUB_OUTPUT
      shell: bash

    - name: Summarize results
      id: summary
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        METADATA_FILE: ${{ steps.export.outputs.metadata-file }}
      with:
        script: |
          const fs = require('fs');
          const metadata = JSON.parse(fs.readFileSync(process.env.METADATA_FILE, 'utf8'));
          const digest = metadata['containerimage.digest'];
          const [image, ...images] = metadata['image.name'].split(',');
          const additionalImages = images.join(',');
          return { digest, image, additionalImages };
